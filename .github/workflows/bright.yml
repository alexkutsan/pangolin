name: Security Tests

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read
  id-token: write

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install application dependencies
      run: npm ci

    - name: Start application
      run: docker compose up --wait

    - name: Wait for application to be ready
      run: |
        until nc -zv 127.0.0.1 51820; do
          echo "Waiting for application to be ready..."
          sleep 3
        done

    - name: Set up Node.js 22.x
      uses: actions/setup-node@v3
      with:
        node-version: '22.x'

    - name: Install SecTesterJS dependencies
      run: npm i --save=false --prefix .brightsec @sectester/core @sectester/repeater @sectester/scan @sectester/runner @sectester/reporter

    - name: Configure Bright credentials
      uses: ./.github/workflows/composite/configure-bright-credentials
      with:
        BRIGHT_HOSTNAME: development.playground.brightsec.com
        BRIGHT_PROJECT_ID: 5VY4XBicodsJNKJtoPAmyP
        BRIGHT_TOKEN: ${{ secrets.BRIGHT_TOKEN }}

    - name: Run security tests
      env:
        BRIGHT_HOSTNAME: development.playground.brightsec.com
        BRIGHT_PROJECT_ID: 5VY4XBicodsJNKJtoPAmyP
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRIGHT_TOKEN: ${{ env.BRIGHT_TOKEN }}
        BRIGHT_TARGET_URL: http://127.0.0.1:51820
      run: node --experimental-transform-types --experimental-strip-types --experimental-detect-module --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --disable-warning=ExperimentalWarning --test-force-exit --test .brightsec/tests/*.test.ts --test-concurrency=4
